<!doctype html>
<html>
  <head>
    <title>CRUD Data Pasien</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(to right, #74ebd5, #acb6e5);
        margin: 0;
      }

      .container {
        max-width: 900px;
        margin: 50px auto;
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      h1 {
        text-align: center;
        color: #2c3e50;
      }

      .title {
        text-align: center;
        color: #555;
        margin-bottom: 15px;
      }

      .form,
      .search-box {
        display: flex;
        gap: 10px;
        margin-bottom: 15px;
      }

      input {
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
        flex: 1;
      }

      button {
        padding: 10px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.2s;
      }

      button:hover {
        opacity: 0.85;
        transform: scale(1.03);
      }

      .btn-tambah {
        background: #27ae60;
        color: white;
      }
      .btn-clear {
        background: #7f8c8d;
        color: white;
      }
      .btn-edit {
        background: #2980b9;
        color: white;
      }
      .btn-hapus {
        background: #e74c3c;
        color: white;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th {
        background: #2c3e50;
        color: white;
        padding: 10px;
      }

      td {
        padding: 10px;
        border-bottom: 1px solid #ddd;
        text-align: center;
      }

      tr:hover {
        background: #f1f1f1;
      }

      .info {
        margin-top: 10px;
        font-size: 14px;
        color: #555;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>CRUD Data Pasien</h1>
      <p class="title">Sistem Manajemen Data Pasien</p>

      <!-- FORM -->
      <div class="form">
        <input type="text" id="nama" placeholder="Nama" />
        <input type="number" id="umur" placeholder="Umur" />
        <input type="text" id="diagnosa" placeholder="Diagnosa" />
        <button class="btn-tambah" onclick="tambahData()">Tambah</button>
        <button class="btn-clear" onclick="clearForm()">Clear</button>
      </div>

      <!-- SEARCH -->
      <div class="search-box">
        <input
          type="text"
          id="search"
          placeholder="Cari nama pasien..."
          onkeyup="render()"
        />
      </div>

      <!-- TABLE -->
      <table>
        <thead>
          <tr>
            <th>Nama</th>
            <th>Umur</th>
            <th>Diagnosa</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="tabelData"></tbody>
      </table>

      <p class="info" id="totalData"></p>
    </div>

    <script>
      let dataPasien = JSON.parse(localStorage.getItem("pasien")) || [];

      function render() {
        let tabel = document.getElementById("tabelData");
        let keyword = document.getElementById("search").value.toLowerCase();
        tabel.innerHTML = "";

        let filtered = dataPasien.filter((p) =>
          p.nama.toLowerCase().includes(keyword),
        );

        filtered.forEach((p, index) => {
          tabel.innerHTML += `
    <tr>
      <td>${p.nama}</td>
      <td>${p.umur}</td>
      <td>${p.diagnosa}</td>
      <td>
        <button class="btn-edit" onclick="editData(${index})">Edit</button>
        <button class="btn-hapus" onclick="hapusData(${index})">Hapus</button>
      </td>
    </tr>`;
        });

        document.getElementById("totalData").innerText =
          "Total Pasien: " + filtered.length;

        localStorage.setItem("pasien", JSON.stringify(dataPasien));
      }

      function tambahData() {
        let nama = document.getElementById("nama").value;
        let umur = document.getElementById("umur").value;
        let diagnosa = document.getElementById("diagnosa").value;

        if (!nama || !umur || !diagnosa) {
          alert("Semua field harus diisi!");
          return;
        }

        dataPasien.push({ nama, umur, diagnosa });
        clearForm();
        render();
      }

      function hapusData(index) {
        dataPasien.splice(index, 1);
        render();
      }

      function editData(index) {
        let p = dataPasien[index];
        document.getElementById("nama").value = p.nama;
        document.getElementById("umur").value = p.umur;
        document.getElementById("diagnosa").value = p.diagnosa;

        hapusData(index);
      }

      function clearForm() {
        document.getElementById("nama").value = "";
        document.getElementById("umur").value = "";
        document.getElementById("diagnosa").value = "";
      }

      render();
    </script>
  </body>
</html>
